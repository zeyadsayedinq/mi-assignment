<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020617"/>
      <stop offset="100%" style="stop-color:#0A0B1A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22D3EE"/>
      <stop offset="100%" style="stop-color:#A855F7"/>
    </linearGradient>
    <linearGradient id="logobg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22D3EE"/>
      <stop offset="100%" style="stop-color:#A855F7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.04" stroke="#22D3EE" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Glow orb top-right -->
  <circle cx="1050" cy="120" r="200" fill="#A855F7" opacity="0.08" filter="url(#glow)"/>
  <!-- Glow orb bottom-left -->
  <circle cx="150" cy="520" r="150" fill="#22D3EE" opacity="0.07" filter="url(#glow)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Logo box -->
  <rect x="72" y="80" width="72" height="72" rx="18" fill="url(#logobg)"/>
  <text x="108" y="131" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="32" fill="#000000" text-anchor="middle">Mi</text>

  <!-- Brand name -->
  <text x="164" y="108" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="36" fill="#FFFFFF" letter-spacing="-0.5">Mi-Assignment</text>
  <text x="164" y="138" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="16" fill="#64748B" letter-spacing="0.5">mi-assignment.com</text>

  <!-- Main headline -->
  <text x="72" y="240" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="72" fill="#FFFFFF" letter-spacing="-2">حل أي واجب</text>
  <text x="72" y="325" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="72" fill="#FFFFFF" letter-spacing="-2">جامعي في ثوانٍ</text>

  <!-- Gradient underline under headline -->
  <rect x="72" y="342" width="420" height="5" rx="3" fill="url(#accent)"/>

  <!-- English subline -->
  <text x="72" y="400" font-family="system-ui, -apple-system, sans-serif" font-weight="500" font-size="26" fill="#94A3B8">AI Academic Assistant for MENA Students</text>

  <!-- Feature pills -->
  <g font-family="system-ui, -apple-system, sans-serif" font-weight="600" font-size="15">
    <!-- Pill 1 -->
    <rect x="72" y="440" width="140" height="38" rx="19" fill="#22D3EE" opacity="0.12"/>
    <rect x="72" y="440" width="140" height="38" rx="19" fill="none" stroke="#22D3EE" stroke-width="1" opacity="0.4"/>
    <text x="142" y="464" fill="#22D3EE" text-anchor="middle">✍️ مقالات</text>

    <!-- Pill 2 -->
    <rect x="224" y="440" width="160" height="38" rx="19" fill="#A855F7" opacity="0.12"/>
    <rect x="224" y="440" width="160" height="38" rx="19" fill="none" stroke="#A855F7" stroke-width="1" opacity="0.4"/>
    <text x="304" y="464" fill="#A855F7" text-anchor="middle">📊 بروزنتيشن</text>

    <!-- Pill 3 -->
    <rect x="396" y="440" width="120" height="38" rx="19" fill="#22D3EE" opacity="0.12"/>
    <rect x="396" y="440" width="120" height="38" rx="19" fill="none" stroke="#22D3EE" stroke-width="1" opacity="0.4"/>
    <text x="456" y="464" fill="#22D3EE" text-anchor="middle">💻 كود</text>

    <!-- Pill 4 -->
    <rect x="528" y="440" width="160" height="38" rx="19" fill="#A855F7" opacity="0.12"/>
    <rect x="528" y="440" width="160" height="38" rx="19" fill="none" stroke="#A855F7" stroke-width="1" opacity="0.4"/>
    <text x="608" y="464" fill="#A855F7" text-anchor="middle">📐 رياضيات</text>

    <!-- Pill 5 -->
    <rect x="700" y="440" width="120" height="38" rx="19" fill="#22D3EE" opacity="0.12"/>
    <rect x="700" y="440" width="120" height="38" rx="19" fill="none" stroke="#22D3EE" stroke-width="1" opacity="0.4"/>
    <text x="760" y="464" fill="#22D3EE" text-anchor="middle">⚖️ قانون</text>
  </g>

  <!-- Free badge -->
  <rect x="72" y="510" width="210" height="44" rx="22" fill="url(#accent)"/>
  <text x="177" y="537" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="17" fill="#000000" text-anchor="middle">🚀 مجاني للبدء — ابدأ الآن</text>

  <!-- Right side — big stat card -->
  <rect x="830" y="180" width="300" height="280" rx="24" fill="#FFFFFF" opacity="0.04"/>
  <rect x="830" y="180" width="300" height="280" rx="24" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.08"/>

  <!-- Stat: missions per quarter -->
  <text x="980" y="260" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="80" fill="#FFFFFF" text-anchor="middle" opacity="0.95">60</text>
  <text x="980" y="295" font-family="system-ui, -apple-system, sans-serif" font-weight="500" font-size="16" fill="#64748B" text-anchor="middle">missions / semester</text>

  <!-- Divider -->
  <rect x="870" y="320" width="220" height="1" fill="#FFFFFF" opacity="0.08"/>

  <!-- Price -->
  <text x="980" y="370" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="42" fill="url(#accent)" text-anchor="middle">1,000 EGP</text>
  <text x="980" y="400" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="15" fill="#64748B" text-anchor="middle">per quarter — full semester</text>

  <!-- Stars -->
  <text x="980" y="440" font-family="system-ui, -apple-system, sans-serif" font-size="22" text-anchor="middle">⭐⭐⭐⭐⭐</text>

  <!-- Bottom border -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accent)" opacity="0.4"/>
</svg>

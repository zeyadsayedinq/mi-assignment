<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020617"/>
      <stop offset="100%" style="stop-color:#0F172A"/>
    </linearGradient>
    <linearGradient id="cyan-purple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22D3EE"/>
      <stop offset="100%" style="stop-color:#A855F7"/>
    </linearGradient>
    <radialGradient id="glow1" cx="30%" cy="40%" r="40%">
      <stop offset="0%" style="stop-color:#22D3EE;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#22D3EE;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="70%" cy="60%" r="40%">
      <stop offset="0%" style="stop-color:#A855F7;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#A855F7;stop-opacity:0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Grid lines -->
  <g stroke="#1E293B" stroke-width="1" opacity="0.5">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Logo box -->
  <rect x="80" y="80" width="90" height="90" rx="22" fill="url(#cyan-purple)"/>
  <text x="125" y="143" font-family="Arial Black, Arial" font-size="40" font-weight="900" fill="#000" text-anchor="middle">Mi</text>

  <!-- Top badge -->
  <rect x="80" y="200" width="340" height="36" rx="18" fill="#22D3EE" fill-opacity="0.12" stroke="#22D3EE" stroke-opacity="0.3" stroke-width="1"/>
  <text x="250" y="223" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#22D3EE" text-anchor="middle" letter-spacing="3">AI ACADEMIC HELPER · MENA STUDENTS</text>

  <!-- Main heading -->
  <text x="80" y="310" font-family="Arial Black, Arial" font-size="72" font-weight="900" fill="#FFFFFF" letter-spacing="-2">Mi-Assignment</text>

  <!-- Subheading -->
  <text x="80" y="380" font-family="Arial, sans-serif" font-size="28" fill="#94A3B8">Solve any assignment in 15 seconds.</text>
  <text x="80" y="420" font-family="Arial, sans-serif" font-size="28" fill="#94A3B8">Essays · Code · Math · Presentations</text>

  <!-- Gradient line -->
  <rect x="80" y="460" width="500" height="4" rx="2" fill="url(#cyan-purple)"/>

  <!-- Bottom stats -->
  <text x="80" y="510" font-family="Arial Black, Arial" font-size="18" font-weight="900" fill="#22D3EE">20+ Assignment Types</text>
  <text x="80" y="540" font-family="Arial, sans-serif" font-size="16" fill="#475569">Arabic · English · Egypt · Saudi · UAE · Kuwait · Jordan</text>

  <!-- Right side - features -->
  <rect x="780" y="80" width="340" height="470" rx="16" fill="#0A0B0E" stroke="#1E293B" stroke-width="1"/>

  <text x="950" y="130" font-family="Arial Black, Arial" font-size="16" font-weight="900" fill="#22D3EE" text-anchor="middle">FEATURES</text>
  <rect x="830" y="140" width="240" height="2" rx="1" fill="#22D3EE" fill-opacity="0.3"/>

  <g font-family="Arial, sans-serif" font-size="15" fill="#94A3B8">
    <text x="820" y="180">✓  Essays &amp; Reports</text>
    <text x="820" y="215">✓  Presentations + AI Images</text>
    <text x="820" y="250">✓  Code in Any Language</text>
    <text x="820" y="285">✓  Math &amp; Engineering</text>
    <text x="820" y="320">✓  SQL &amp; Databases</text>
    <text x="820" y="355">✓  Research Papers</text>
    <text x="820" y="390">✓  Arabic RTL Interface</text>
    <text x="820" y="425">✓  Undetectable by AI Tools</text>
  </g>

  <!-- Price badge -->
  <rect x="820" y="450" width="260" height="70" rx="12" fill="url(#cyan-purple)" fill-opacity="0.15" stroke="#22D3EE" stroke-opacity="0.4" stroke-width="1"/>
  <text x="950" y="480" font-family="Arial Black, Arial" font-size="22" font-weight="900" fill="#FFFFFF" text-anchor="middle">From 1,000 EGP</text>
  <text x="950" y="505" font-family="Arial, sans-serif" font-size="13" fill="#94A3B8" text-anchor="middle">per semester · Free plan available</text>

  <!-- Domain -->
  <text x="600" y="608" font-family="Arial, sans-serif" font-size="16" fill="#334155" text-anchor="middle">www.mi-assignment.com</text>

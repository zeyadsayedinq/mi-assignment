[build]
  command   = "npm run build:client"
  publish   = "dist"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Functions handle /api/* — do NOT redirect to index.html
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/:splat"
  status = 200
  force  = true

# SPA catch-all
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

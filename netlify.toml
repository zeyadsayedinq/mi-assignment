[build]
  publish = "dist"
  command = "npm run build:client"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# ── API routes → Netlify Functions ────────────────────────────────────────────
# MUST come before the SPA catch-all

[[redirects]]
  from = "/api/check-quota"
  to = "/.netlify/functions/check-quota"
  status = 200

[[redirects]]
  from = "/api/record-mission"
  to = "/.netlify/functions/record-mission"
  status = 200

[[redirects]]
  from = "/api/create-charge"
  to = "/.netlify/functions/create-charge"
  status = 200

[[redirects]]
  from = "/api/apply-referral"
  to = "/.netlify/functions/apply-referral"
  status = 200

[[redirects]]
  from = "/api/send-email"
  to = "/.netlify/functions/send-email"
  status = 200

[[redirects]]
  from = "/api/health"
  to = "/.netlify/functions/health"
  status = 200

[[redirects]]
  from = "/api/subscription/:userId"
  to = "/.netlify/functions/subscription"
  status = 200

[[redirects]]
  from = "/api/admin/users-by-email"
  to = "/.netlify/functions/admin-users"
  status = 200

[[redirects]]
  from = "/api/admin/users/:userId/subscription"
  to = "/.netlify/functions/admin-subscription"
  status = 200

[[redirects]]
  from = "/api/webhook/tap"
  to = "/.netlify/functions/tap-webhook"
  status = 200

# ── SPA catch-all — MUST be last ──────────────────────────────────────────────
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ── Headers ───────────────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
